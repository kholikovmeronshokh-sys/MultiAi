<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Code Generator</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="shortcut icon" href="/favicon.ico?v=2" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
<link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="manifest" href="/favicon_io/site.webmanifest" /><link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">Kod va tushuntirish</p>
        <h1>Code Generator</h1>
        <p class="subtitle">
          Vazifani yozing, kerakli kod, qisqa izoh va kutubxona tushuntirishi
          bilan javob oling.
        </p>
        <div class="nav">
          <a class="nav-link" href="/">Summary</a>
          <a class="nav-link" href="/chatbot">Chatbot</a>
          <a class="nav-link active" href="/code">Code</a>
          <a class="nav-link" href="/translater">Translater</a>
          <a class="nav-link" href="/shrift">Shrift</a>
          <a class="nav-link" href="/heshteg">Heshteg</a>
          <a class="nav-link" href="/idea">Idea</a>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>Dasturlash tili</span>
          <select id="codeLang">
            <option value="JavaScript">JavaScript</option>
            <option value="TypeScript">TypeScript</option>
            <option value="Python">Python</option>
            <option value="Node.js">Node.js</option>
            <option value="Go">Go</option>
            <option value="Java">Java</option>
            <option value="C#">C#</option>
          </select>
        </label>

        <label class="field">
          <span>Vazifa</span>
          <textarea
            id="codeTask"
            placeholder="Masalan: REST API uchun login/register endpoint yoz..."
            rows="8"
          ></textarea>
        </label>

        <div class="actions">
          <button id="codeGenerate" class="primary">Kod yarat</button>
          <button id="codeClear" class="ghost">Tozalash</button>
        </div>
      </section>

      <section class="panel result">
        <div class="result-header">
          <h2>Natija</h2>
          <div class="result-actions">
            <button id="codeCopy" class="ghost">Nusxa olish</button>
            <button id="codeCopyBlock" class="ghost">Faqat kod</button>
          </div>
        </div>
        <div id="codeOutput" class="output">Bu yerda kod va izoh chiqadi...</div>
        <div id="codeError" class="error" role="alert"></div>
      </section>

      <footer class="footer">
        <span>2026 yil MultiAi</span>
        <span class="dot"></span>
        <span>Kholikov Meronshokh</span>
      </footer>
    </main>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/code.js"></script>
  </body>
</html>

<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Shrift Generator</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="shortcut icon" href="/favicon.ico?v=2" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
<link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="manifest" href="/favicon_io/site.webmanifest" /><link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@400;600&family=Raleway:wght@400;600&family=Oswald:wght@400;600&family=Lora:wght@400;600&family=Merriweather:wght@400;700&family=Fira+Sans:wght@400;600&family=Roboto+Slab:wght@400;600&family=PT+Serif:wght@400;700&family=Nunito:wght@400;700&family=Quicksand:wght@400;600&family=Josefin+Sans:wght@400;600&family=Archivo:wght@400;600&family=Source+Serif+4:wght@400;600&family=Zilla+Slab:wght@400;600&family=Work+Sans:wght@400;600&family=Space+Grotesk:wght@400;600&family=Crimson+Text:wght@400;600&family=Vollkorn:wght@400;600&family=Libre+Baskerville:wght@400;700&display=swap"
    />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">25 xil shrift</p>
        <h1>Shrift Generator</h1>
        <p class="subtitle">
          Matnni yozing va 25 xil shrift ko'rinishida oling. Har birini alohida
          nusxa olishingiz mumkin.
        </p>
        <div class="nav">
          <a class="nav-link" href="/">Summary</a>
          <a class="nav-link" href="/chatbot">Chatbot</a>
          <a class="nav-link" href="/code">Code</a>
          <a class="nav-link" href="/translater">Translater</a>
          <a class="nav-link active" href="/shrift">Shrift</a>
          <a class="nav-link" href="/heshteg">Heshteg</a>
          <a class="nav-link" href="/idea">Idea</a>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>Matn</span>
          <textarea id="fontInput" rows="4" placeholder="Matningizni yozing..."></textarea>
        </label>
        <div class="actions">
          <button id="fontFill" class="primary">Namuna yoz</button>
          <button id="fontClear" class="ghost">Tozalash</button>
        </div>
      </section>

      <section class="panel result">
        <div class="result-header">
          <h2>Natijalar</h2>
          <div class="result-actions">
            <button id="fontCopyAll" class="ghost">Barchasini nusxa olish</button>
          </div>
        </div>
        <div id="fontGrid" class="font-grid"></div>
      </section>

      <footer class="footer">
        <span>2026 yil MultiAi</span>
        <span class="dot"></span>
        <span>Kholikov Meronshokh</span>
      </footer>
    </main>

    <script src="/shrift.js"></script>
  </body>
</html>

<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Heshteg Generator</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="shortcut icon" href="/favicon.ico?v=2" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
<link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="manifest" href="/favicon_io/site.webmanifest" /><link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">Trend hashtaglar</p>
        <h1>Heshteg Generator</h1>
        <p class="subtitle">
          Matn yozing va tayyor hashtaglar oling. Natija # formatda chiqadi.
        </p>
        <div class="nav">
          <a class="nav-link" href="/">Summary</a>
          <a class="nav-link" href="/chatbot">Chatbot</a>
          <a class="nav-link" href="/code">Code</a>
          <a class="nav-link" href="/translater">Translater</a>
          <a class="nav-link" href="/shrift">Shrift</a>
          <a class="nav-link active" href="/heshteg">Heshteg</a>
          <a class="nav-link" href="/idea">Idea</a>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>Mavzu</span>
          <textarea id="tagInput" rows="4" placeholder="Masalan: AI, biznes, marketing..."
          ></textarea>
        </label>

        <label class="field">
          <span>Hashtag soni: <span id="tagCountLabel">15</span></span>
          <input id="tagCount" type="range" min="5" max="30" value="15" />
        </label>

        <div class="actions">
          <button id="tagGenerate" class="primary">Heshteg yarat</button>
          <button id="tagClear" class="ghost">Tozalash</button>
        </div>
      </section>

      <section class="panel result">
        <div class="result-header">
          <h2>Natija</h2>
          <div class="result-actions">
            <button id="tagCopy" class="ghost">Nusxa olish</button>
          </div>
        </div>
        <div id="tagOutput" class="output">#heshteglar bu yerda chiqadi...</div>
        <div id="tagError" class="error" role="alert"></div>
      </section>

      <footer class="footer">
        <span>2026 yil MultiAi</span>
        <span class="dot"></span>
        <span>Kholikov Meronshokh</span>
      </footer>
    </main>

    <script src="/heshteg.js"></script>
  </body>
</html>

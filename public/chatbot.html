<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chatbot - Uzbekcha</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="shortcut icon" href="/favicon.ico?v=2" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
<link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="manifest" href="/favicon_io/site.webmanifest" /><link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">Professional yordamchi</p>
        <h1>AI Chatbot</h1>
        <p class="subtitle">
          Ozbek tilida professional javoblar, kerakli joyda emoji bilan.
        </p>
        <div class="nav">
          <a class="nav-link" href="/">Summary</a>
          <a class="nav-link active" href="/chatbot">Chatbot</a>
          <a class="nav-link" href="/code">Code</a>
          <a class="nav-link" href="/translater">Translater</a>
          <a class="nav-link" href="/shrift">Shrift</a>
          <a class="nav-link" href="/heshteg">Heshteg</a>
          <a class="nav-link" href="/idea">Idea</a>
        </div>
      </header>

      <section class="panel chat">
        <div id="chatWindow" class="chat-window">
          <div class="chat-bubble bot">Salom! Qanday yordam bera olaman? 😊</div>
        </div>
        <div class="chat-input">
          <textarea id="chatInput" rows="3" placeholder="Savolingizni yozing..."></textarea>
          <div class="actions">
            <button id="send" class="primary">Yuborish</button>
            <button id="clearChat" class="ghost">Tozalash</button>
          </div>
        </div>
        <div id="chatError" class="error" role="alert"></div>
      </section>

      <footer class="footer">
        <span>2026 yil MultiAi</span>
        <span class="dot"></span>
        <span>Kholikov Meronshokh</span>
      </footer>
    </main>

    <script src="/chatbot.js"></script>
  </body>
</html>

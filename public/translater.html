<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Translater</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="shortcut icon" href="/favicon.ico?v=2" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
<link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="manifest" href="/favicon_io/site.webmanifest" /><link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">20 tilga tarjima</p>
        <h1>Translater</h1>
        <p class="subtitle">
          Matnni bir vaqtning o'zida 20 ta tilga tarjima qiladi. Har birini
          alohida nusxa olish mumkin.
        </p>
        <div class="nav">
          <a class="nav-link" href="/">Summary</a>
          <a class="nav-link" href="/chatbot">Chatbot</a>
          <a class="nav-link" href="/code">Code</a>
          <a class="nav-link active" href="/translater">Translater</a>
          <a class="nav-link" href="/shrift">Shrift</a>
          <a class="nav-link" href="/heshteg">Heshteg</a>
          <a class="nav-link" href="/idea">Idea</a>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>Matn</span>
          <textarea id="translateInput" rows="6" placeholder="Tarjima uchun matn..."></textarea>
        </label>

        <div class="lang-grid" id="langGrid"></div>

        <div class="actions">
          <button id="translateBtn" class="primary">Tarjima qil</button>
          <button id="translateClear" class="ghost">Tozalash</button>
          <button id="translateCopyAll" class="ghost">Barchasini nusxa olish</button>
        </div>
      </section>

      <section class="panel result">
        <div class="result-header">
          <h2>Natijalar</h2>
        </div>
        <div id="translateOutput" class="translate-output"></div>
        <div id="translateError" class="error" role="alert"></div>
      </section>

      <footer class="footer">
        <span>2026 yil MultiAi</span>
        <span class="dot"></span>
        <span>Kholikov Meronshokh</span>
      </footer>
    </main>

    <script src="/translater.js"></script>
  </body>
</html>

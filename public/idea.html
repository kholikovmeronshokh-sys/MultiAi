<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Idea Generator</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="shortcut icon" href="/favicon.ico?v=2" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
<link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="manifest" href="/favicon_io/site.webmanifest" /><link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
<link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">G'oyalar oqimi</p>
        <h1>Idea Generator</h1>
        <p class="subtitle">
          Har xil temada g'oyalar oling: biznes, kontent, loyiha, marketing va boshqalar.
        </p>
        <div class="nav">
          <a class="nav-link" href="/">Summary</a>
          <a class="nav-link" href="/chatbot">Chatbot</a>
          <a class="nav-link" href="/code">Code</a>
          <a class="nav-link" href="/translater">Translater</a>
          <a class="nav-link" href="/shrift">Shrift</a>
          <a class="nav-link" href="/heshteg">Heshteg</a>
          <a class="nav-link active" href="/idea">Idea</a>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>Mavzu</span>
          <input id="ideaTopic" type="text" placeholder="Masalan: yangi ilova, marketing kampaniya" />
        </label>

        <label class="field">
          <span>Uslub</span>
          <select id="ideaTone">
            <option value="zamonaviy">Zamonaviy</option>
            <option value="kreativ">Kreativ</option>
            <option value="biznes">Biznes</option>
            <option value="soddalashtirilgan">Soddalashtirilgan</option>
            <option value="professional">Professional</option>
          </select>
        </label>

        <label class="field">
          <span>G'oya soni: <span id="ideaCountLabel">12</span></span>
          <input id="ideaCount" type="range" min="5" max="25" value="12" />
        </label>

        <div class="actions">
          <button id="ideaGenerate" class="primary">G'oya yarat</button>
          <button id="ideaClear" class="ghost">Tozalash</button>
        </div>
      </section>

      <section class="panel result">
        <div class="result-header">
          <h2>Natija</h2>
          <div class="result-actions">
            <button id="ideaCopy" class="ghost">Nusxa olish</button>
          </div>
        </div>
        <div id="ideaOutput" class="output">Bu yerda g'oyalar chiqadi...</div>
        <div id="ideaError" class="error" role="alert"></div>
      </section>

      <footer class="footer">
        <span>2026 yil MultiAi</span>
        <span class="dot"></span>
        <span>Kholikov Meronshokh</span>
      </footer>
    </main>

    <script src="/idea.js"></script>
  </body>
</html>
